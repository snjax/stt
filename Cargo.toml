[package]
name = "stt"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0"
arboard = "3.4"
cpal = "0.16"
eframe = { version = "0.33", default-features = true }
egui = "0.33"
hound = "3.5"
rustfft = "6.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sentencepiece = "0.13"

[dependencies.ort]
version = "=2.0.0-rc.10"
default-features = false
features = ["std", "ndarray", "load-dynamic"]
